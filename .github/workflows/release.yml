name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            go gcc sqlite pkgconf base-devel \
            cmake ninja extra-cmake-modules \
            qt6-base qt6-declarative qt6-multimedia qt6-tools \
            kirigami knotifications kwallet kstatusnotifieritem kio \
            git tar

      - name: Build daemon
        run: |
          mkdir -p dist
          cd daemon
          CGO_ENABLED=1 GOFLAGS="-mod=vendor" \
            go build -trimpath -ldflags="-s -w" \
            -o ../dist/khaapp-daemon-linux-amd64 ./cmd

      - name: Build frontend
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_DEFAULT_MAJOR_VERSION=6
          cmake --build build --parallel $(nproc)
          cp build/app/khaapp-bin dist/khaapp-frontend-linux-amd64

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHDIR="dist/khaapp-${VERSION}"
          mkdir -p "$ARCHDIR"
          cp dist/khaapp-daemon-linux-amd64 "$ARCHDIR/khaapp-daemon"
          cp dist/khaapp-frontend-linux-amd64 "$ARCHDIR/khaapp-bin"
          cp packaging/aur/khaapp-native-launcher.sh "$ARCHDIR/khaapp"
          chmod +x "$ARCHDIR/khaapp"
          cp README.md LICENSE CHANGELOG.md "$ARCHDIR/"
          tar -czf "dist/khaapp-${VERSION}-linux-amd64.tar.gz" \
            -C dist "khaapp-${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/khaapp-*.tar.gz
          generate_release_notes: false
          body: |
            ## KhaApp ${{ github.ref_name }}

            Native WhatsApp client for KDE Plasma 6.

            **Disclaimer**: Unofficial client. Not affiliated with Meta.
            Use at your own risk. May violate WhatsApp Terms of Service.

            ### Installation

            **Arch / CachyOS (AUR):**
            ```bash
            yay -S khaapp
            ```

            **From binary archive (manual):**
            ```bash
            tar xzf khaapp-${{ github.ref_name }}-linux-amd64.tar.gz
            cd khaapp-${{ github.ref_name }}
            ./khaapp
            ```

            **Build from source:** see README.md

            ### Changes
            See CHANGELOG.md
