name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-daemon:
    name: Build Go daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install sqlite dev
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config gcc
      - name: Build
        run: cd daemon && CGO_ENABLED=1 GOFLAGS="-mod=vendor" go build -v ./cmd
      - name: Vet
        run: cd daemon && go vet ./...

  build-frontend:
    name: Build Qt frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build extra-cmake-modules \
            qt6-base-dev qt6-declarative-dev qt6-multimedia-dev \
            libkf6kirigami2-dev libkf6notifications-dev libkf6wallet-dev \
            libkf6kio-dev pkg-config
      - name: CMake configure
        run: cmake -B build -S . -GNinja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
